name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" >> $env:GITHUB_ENV

      - name: Install native dependencies
        shell: pwsh
        run: |
          & $env:USERPROFILE\vcpkg\vcpkg.exe install libjpeg-turbo:x64-windows libpng:x64-windows libwebp:x64-windows libavif:x64-windows libheif:x64-windows

      - name: Build release binaries
        shell: pwsh
        run: |
          cargo build --release

      - name: Package assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $artifactBase = "Image-Viewer-$version-windows-x64"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path package -Force | Out-Null

          Copy-Item target/release/Image_Viewer.exe package/

          if (Test-Path target/release/image_viewer_updater.exe) {
            Copy-Item target/release/image_viewer_updater.exe package/
          }

          Get-ChildItem target/release -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName package/
          }

          Compress-Archive -Path package/* -DestinationPath "dist/$artifactBase.zip" -Force

          $hash = (Get-FileHash "dist/$artifactBase.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifactBase.zip" | Out-File -Encoding ascii "dist/$artifactBase.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
