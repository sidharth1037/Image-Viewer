name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_HOME: C:\c
  CARGO_TARGET_DIR: D:\t

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      CC: cl
      CXX: cl
      AR: lib
    defaults:
      run:
        shell: pwsh
        working-directory: w

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: w

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install native dependencies
        run: |
          & $env:USERPROFILE\vcpkg\vcpkg.exe install libjpeg-turbo:x64-windows libpng:x64-windows libwebp:x64-windows libavif:x64-windows libheif:x64-windows
          & $env:USERPROFILE\vcpkg\vcpkg.exe install libjpeg-turbo:x64-windows-static-md libpng:x64-windows-static-md libwebp:x64-windows-static-md libavif:x64-windows-static-md libheif:x64-windows-static-md

      - name: Install native build tools
        run: |
          choco install meson ninja nasm -y

          $mesonDir = "${env:ProgramFiles}\Meson"
          $nasmDir = "${env:ProgramFiles}\NASM"

          if (Test-Path "$mesonDir\meson.exe") {
            $mesonDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            throw "meson.exe not found in $mesonDir"
          }

          if (Test-Path "$nasmDir\nasm.exe") {
            $nasmDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            throw "nasm.exe not found in $nasmDir"
          }

      - name: Remove MinGW and Strawberry from PATH
        run: |
          $filtered = ($env:PATH -split ";" | Where-Object {
            $_ -and
            $_ -notmatch "Strawberry\\c\\bin" -and
            $_ -notmatch "Strawberry\\perl\\bin" -and
            $_ -notmatch "\\mingw64\\bin"
          }) -join ";"
          "PATH=$filtered" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify toolchain
        run: |
          meson --version
          ninja --version
          nasm -v
          where.exe cl

      - name: Build release binaries
        run: |
          cargo build --release -vv

      - name: Package assets
        run: |
          $version = "${{ github.ref_name }}"
          $artifactBase = "Image-Viewer-$version-windows-x64"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path package -Force | Out-Null

          Copy-Item D:\t\release\Image_Viewer.exe package\

          if (Test-Path D:\t\release\image_viewer_updater.exe) {
            Copy-Item D:\t\release\image_viewer_updater.exe package\
          }

          Get-ChildItem D:\t\release -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName package\
          }

          Compress-Archive -Path package\* -DestinationPath "dist\$artifactBase.zip" -Force

          $hash = (Get-FileHash "dist\$artifactBase.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifactBase.zip" | Out-File -Encoding ascii "dist\$artifactBase.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            w/dist/*.zip
            w/dist/*.sha256